<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#facc15;
}

input{
padding:8px;
font-size:16px;
border-radius:8px;
border:none;
text-align:center;
margin:5px;
}

button{
background:#facc15;
color:black;
padding:10px 15px;
font-size:18px;
margin:5px;
border-radius:10px;
border:none;
cursor:pointer;
}

.score-container{
display:flex;
justify-content:space-around;
margin:30px 0;
flex-wrap:wrap;
}

.team{
background:#111;
padding:20px;
border-radius:15px;
width:300px;
margin:10px;
}

.score{
font-size:70px;
margin:20px 0;
color:#facc15;
}

.stats-box{
margin-top:40px;
padding:20px;
border:1px solid #333;
border-radius:12px;
}

.export-btn{
background:#facc15;
color:black;
margin-top:15px;
}

.reset-btn{
background:#444;
color:white;
margin-top:10px;
}

#playerModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#111;
padding:25px;
border-radius:15px;
max-height:80vh;
overflow-y:auto;
width:320px;
}

.player-btn{
width:100%;
margin:6px 0;
background:#facc15;
color:black;
font-size:18px;
}

.small-note{
font-size:12px;
color:#aaa;
margin-top:8px;
}

#previewModal{
display:none;
position:fixed;
inset:0;
background:black;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

#previewModal img{
width:90%;
max-width:420px;
border-radius:10px;
}

.preview-buttons{
margin-top:15px;
}

</style>
</head>

<body>

<h1>Avispones Scoreboard</h1>

<input id="categoryInput" placeholder="Category (U14)">
<input id="jornadaInput" placeholder="Jornada (3)">
<br>

<input id="playerNameInput" placeholder="Add Player Name">
<button onclick="addPlayer()">Add Player</button>

<div class="score-container">

<div class="team">
<h2>Avispones</h2>
<div class="score" id="avisponesScore">0</div>
<button onclick="updateScore('avispones',1)">+1</button>
<button onclick="updateScore('avispones',6)">+6</button>
<button onclick="updateScore('avispones',-1)">-1</button>
</div>

<div class="team">
<input type="text" id="opponentName" placeholder="Opponent Name">
<div class="score" id="opponentScore">0</div>
<button onclick="updateScore('opponent',1)">+1</button>
<button onclick="updateScore('opponent',6)">+6</button>
<button onclick="updateScore('opponent',-1)">-1</button>
</div>

</div>

<div class="stats-box">

<h2>Player Stats</h2>

<button onclick="openPlayerModal('TD')">+TD</button>
<button onclick="openPlayerModal('INT')">+INT</button>
<button onclick="openPlayerModal('SACK')">+SACK</button>
<button onclick="openPlayerModal('XP')">+XP</button>
<button onclick="openPlayerModal('FLAG')">+FLAG</button>
<button onclick="openPlayerModal('CATCH')">+CATCH</button>
<button onclick="openPlayerModal('SAF')">+SAF</button>

</div>

<button class="export-btn" onclick="exportFinalScore()">Export Final Score</button>
<button class="export-btn" onclick="exportStatsImage()">Export Game Stats</button>
<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<img id="teamLogo" src="logo.PNG" style="display:none;">

<div id="playerModal">
<div class="modal-content">
<h3>Select Player</h3>
<div id="playerList"></div>
<div class="small-note">Tap = Add | Long Press = Subtract</div>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<div id="previewModal">
<img id="previewImage">
<div class="preview-buttons">
<button onclick="shareImage()">Share</button>
<button onclick="downloadImage()">Save</button>
<button onclick="closePreview()">Cancel</button>
</div>
</div>

<script>

let avisponesScore=0
let opponentScore=0
let stats={}
let selectedStatType=null
let lastCanvas=null

function updateScore(team,val){

if(team==="avispones"){
avisponesScore=Math.max(0,avisponesScore+val)
document.getElementById("avisponesScore").innerText=avisponesScore
}else{
opponentScore=Math.max(0,opponentScore+val)
document.getElementById("opponentScore").innerText=opponentScore
}

}

function resetGame(){

if(confirm("Reset the game?")){

avisponesScore=0
opponentScore=0
stats={}

document.getElementById("avisponesScore").innerText=0
document.getElementById("opponentScore").innerText=0

}

}

function addPlayer(){

const name=document.getElementById("playerNameInput").value.trim()

if(!name||stats[name]) return

stats[name]={TD:0,INT:0,SACK:0,XP:0,FLAG:0,CATCH:0,SAF:0}

document.getElementById("playerNameInput").value=""

}

function openPlayerModal(statType){

selectedStatType=statType

const modal=document.getElementById("playerModal")
const list=document.getElementById("playerList")

list.innerHTML=""

Object.keys(stats).forEach(player=>{

const btn=document.createElement("button")
btn.innerText=player
btn.className="player-btn"

let pressTimer

btn.onclick=()=>{

stats[player][selectedStatType]++
closeModal()

}

btn.onmousedown=()=>{

pressTimer=setTimeout(()=>{

stats[player][selectedStatType]=Math.max(0,stats[player][selectedStatType]-1)
closeModal()

},600)

}

btn.onmouseup=()=>clearTimeout(pressTimer)

btn.ontouchstart=btn.onmousedown
btn.ontouchend=()=>clearTimeout(pressTimer)

list.appendChild(btn)

})

modal.style.display="flex"

}

function closeModal(){
document.getElementById("playerModal").style.display="none"
}

function showPreview(canvas){

lastCanvas=canvas

const img=canvas.toDataURL("image/png")

document.getElementById("previewImage").src=img
document.getElementById("previewModal").style.display="flex"

}

function closePreview(){
document.getElementById("previewModal").style.display="none"
}

async function shareImage(){

const blob=await new Promise(r=>lastCanvas.toBlob(r,"image/png"))
const file=new File([blob],"score.png",{type:"image/png"})

if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file]})
}

}

function downloadImage(){

const link=document.createElement("a")
link.download="score.png"
link.href=lastCanvas.toDataURL()
link.click()

}

function exportFinalScore(){

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=1080
canvas.height=1350

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#facc15"
ctx.font="bold 60px Arial"
ctx.textAlign="center"
ctx.fillText("FINAL SCORE",540,220)

ctx.fillStyle="white"
ctx.font="120px Arial"
ctx.fillText(avisponesScore+" - "+opponentScore,540,650)

showPreview(canvas)

}

function exportStatsImage(){

const players=Object.keys(stats)

if(players.length===0){
alert("No stats yet")
return
}

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=1080
canvas.height=1350

ctx.fillStyle="#000"
ctx.fillRect(0,0,1080,1350)

ctx.fillStyle="#facc15"
ctx.font="bold 60px Arial"
ctx.textAlign="center"
ctx.fillText("AVISPONES GAME STATS",540,200)

let y=320

ctx.font="28px Arial"
ctx.fillStyle="white"

players.forEach(p=>{

ctx.fillText(
p+" TD:"+stats[p].TD+
" INT:"+stats[p].INT+
" SACK:"+stats[p].SACK+
" XP:"+stats[p].XP+
" FLAG:"+stats[p].FLAG+
" CATCH:"+stats[p].CATCH+
" SAF:"+stats[p].SAF
,540,y)

y+=50

})

showPreview(canvas)

}

</script>

</body>
</html>
