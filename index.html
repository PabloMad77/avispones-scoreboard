<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0b6b3a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h2{margin-top:30px;}

button{
padding:14px 20px;
margin:6px;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
}

.statButtons button{
background:#ffcc00;
color:black;
font-weight:bold;
}

.addBtn{background:#007bff;color:white;}
.delBtn{background:#dc3545;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid white;
padding:12px;
font-size:16px;
}

th{
background:#004d2b;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.popupContent{
background:#222;
padding:20px;
margin:80px auto;
width:320px;
border-radius:10px;
}

.popup input{
width:90%;
padding:10px;
margin:10px 0;
font-size:16px;
}

.popup select{
width:95%;
padding:10px;
font-size:16px;
margin-bottom:10px;
}

.popup button{
width:100%;
margin-top:8px;
}

</style>
</head>

<body>

<h1>Avispones Scoreboard</h1>

<button class="addBtn" onclick="openAddPlayer()">Add Player</button>
<button class="delBtn" onclick="openDeletePlayer()">Delete Player</button>

<h2>Offense</h2>

<div class="statButtons">
<button onclick="openStatPopup('TD','offense')">+ TD</button>
<button onclick="openStatPopup('CATCH','offense')">+ CATCH</button>
<button onclick="openStatPopup('XP','offense')">+ XP</button>
</div>

<table id="offenseTable">
<tr>
<th>Player</th>
<th>TD</th>
<th>CATCH</th>
<th>XP</th>
</tr>
</table>

<h2>Defense</h2>

<div class="statButtons">
<button onclick="openStatPopup('INT','defense')">+ INT</button>
<button onclick="openStatPopup('FLAG','defense')">+ FLAG</button>
<button onclick="openStatPopup('SACK','defense')">+ SACK</button>
<button onclick="openStatPopup('TD','defense')">+ TD</button>
</div>

<table id="defenseTable">
<tr>
<th>Player</th>
<th>INT</th>
<th>FLAG</th>
<th>SACK</th>
<th>TD</th>
</tr>
</table>


<!-- ADD PLAYER POPUP -->

<div class="popup" id="addPopup">
<div class="popupContent">

<h3>Add Player</h3>

<input id="playerName" placeholder="Player name">

<select id="playerSide">
<option value="offense">Offense</option>
<option value="defense">Defense</option>
</select>

<button onclick="addPlayer()">Add Player</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>


<!-- DELETE PLAYER POPUP -->

<div class="popup" id="deletePopup">
<div class="popupContent">

<h3>Delete Player</h3>

<div id="deleteList"></div>

<button onclick="closePopup()">Cancel</button>

</div>
</div>


<!-- STAT POPUP -->

<div class="popup" id="statPopup">
<div class="popupContent">

<h3>Select Player</h3>

<div id="statPlayerList"></div>

<button onclick="closePopup()">Cancel</button>

</div>
</div>

<script>

let players=[]
let selectedStat=""
let selectedSide=""

function openAddPlayer(){
document.getElementById("addPopup").style.display="block"
}

function addPlayer(){

let name=document.getElementById("playerName").value
let side=document.getElementById("playerSide").value

if(name==="") return

players.push({
name:name,
side:side,
TD:0,
CATCH:0,
XP:0,
INT:0,
FLAG:0,
SACK:0
})

document.getElementById("playerName").value=""

closePopup()

renderTables()

}

function openDeletePlayer(){

let list=document.getElementById("deleteList")
list.innerHTML=""

players.forEach((p,i)=>{

let btn=document.createElement("button")
btn.innerText=p.name

btn.onclick=function(){
players.splice(i,1)
renderTables()
openDeletePlayer()
}

list.appendChild(btn)

})

document.getElementById("deletePopup").style.display="block"

}

function openStatPopup(stat,side){

selectedStat=stat
selectedSide=side

let container=document.getElementById("statPlayerList")
container.innerHTML=""

players.forEach((p,i)=>{

if(p.side===side){

let btn=document.createElement("button")
btn.innerText=p.name

btn.onclick=function(){

players[i][stat]++

renderTables()

closePopup()

}

container.appendChild(btn)

}

})

document.getElementById("statPopup").style.display="block"

}

function closePopup(){

document.querySelectorAll(".popup").forEach(p=>{
p.style.display="none"
})

}

function renderTables(){

let offenseTable=document.getElementById("offenseTable")
let defenseTable=document.getElementById("defenseTable")

offenseTable.innerHTML="<tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>"
defenseTable.innerHTML="<tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>"

players.forEach((p)=>{

if(p.side==="offense"){

let row=offenseTable.insertRow()

row.insertCell(0).innerText=p.name
row.insertCell(1).innerText=p.TD
row.insertCell(2).innerText=p.CATCH
row.insertCell(3).innerText=p.XP

addLongPress(row,p)

}

if(p.side==="defense"){

let row=defenseTable.insertRow()

row.insertCell(0).innerText=p.name
row.insertCell(1).innerText=p.INT
row.insertCell(2).innerText=p.FLAG
row.insertCell(3).innerText=p.SACK
row.insertCell(4).innerText=p.TD

addLongPress(row,p)

}

})

}

function addLongPress(row,player){

for(let i=1;i<row.cells.length;i++){

let cell=row.cells[i]

let pressTimer

cell.addEventListener("touchstart",function(){

pressTimer=setTimeout(()=>{

let stat=row.parentElement.rows[0].cells[i].innerText

if(player[stat]>0){

player[stat]--

renderTables()

}

},600)

})

cell.addEventListener("touchend",function(){
clearTimeout(pressTimer)
})

}

}

</script>

</body>
</html>
