<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0b6b3a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

input,select{
padding:8px;
font-size:16px;
border-radius:8px;
border:none;
margin:5px;
text-align:center;
}

.score-container{
display:flex;
justify-content:space-around;
margin:30px 0;
flex-wrap:wrap;
}

.team{
background:white;
color:#0b6b3a;
padding:20px;
border-radius:15px;
width:300px;
margin:10px;
}

.score{
font-size:70px;
margin:20px 0;
}

button{
padding:14px 20px;
font-size:18px;
margin:6px;
border-radius:10px;
border:none;
cursor:pointer;
}

.add1{background:#28a745;color:white;}
.add6{background:#14532d;color:white;}
.sub{background:#dc3545;color:white;}

.export-btn{background:#ffc107;color:black;margin-top:20px;}
.reset-btn{background:black;color:white;margin-top:10px;}

.stat-btn{
background:#ffd000;
color:black;
font-weight:bold;
font-size:22px;
padding:16px 20px;
margin:8px;
}

.player{
background:white;
color:black;
padding:12px;
margin:6px auto;
width:260px;
border-radius:10px;
font-size:20px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:white;
color:black;
padding:30px;
border-radius:14px;
}

</style>
</head>

<body>

<h1>Avispones Scoreboard</h1>

<input id="categoryName" placeholder="Category">

<div class="score-container">

<div class="team">
<h2>Avispones</h2>
<div class="score" id="avisponesScore">0</div>
<button class="add1" onclick="updateScore('avispones',1)">+1</button>
<button class="add6" onclick="updateScore('avispones',6)">+6</button>
<button class="sub" onclick="updateScore('avispones',-1)">-1</button>
</div>

<div class="team">
<input id="opponentName" placeholder="Opponent">
<div class="score" id="opponentScore">0</div>
<button class="add1" onclick="updateScore('opponent',1)">+1</button>
<button class="add6" onclick="updateScore('opponent',6)">+6</button>
<button class="sub" onclick="updateScore('opponent',-1)">-1</button>
</div>

</div>

<button class="export-btn">Export Score Image</button>
<br>
<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<hr style="margin:40px 0">

<h2>Avispones Player Stats</h2>

<button onclick="openPlayerManager()">Manage Players</button>

<h3>Offense</h3>

<div>
<button class="stat-btn" onclick="openStat('td','offense')">TD</button>
<button class="stat-btn" onclick="openStat('catch','offense')">CATCH</button>
<button class="stat-btn" onclick="openStat('xp','offense')">XP</button>
</div>

<div id="offensePlayers"></div>

<h3>Defense</h3>

<div>
<button class="stat-btn" onclick="openStat('int','defense')">INT</button>
<button class="stat-btn" onclick="openStat('flag','defense')">FLAG</button>
<button class="stat-btn" onclick="openStat('sack','defense')">SACK</button>
<button class="stat-btn" onclick="openStat('td','defense')">TD</button>
</div>

<div id="defensePlayers"></div>


<!-- PLAYER MANAGER -->

<div class="modal" id="playerManager">
<div class="modal-box">

<h2>Players</h2>

<input id="newPlayerName" placeholder="Player Name">

<select id="newPlayerUnit">
<option value="offense">Offense</option>
<option value="defense">Defense</option>
</select>

<br><br>

<button onclick="addPlayer()">Add Player</button>

<hr>

<div id="playerList"></div>

<br>

<button onclick="closePlayerManager()">Close</button>

</div>
</div>


<!-- STAT SELECT -->

<div class="modal" id="statModal">
<div class="modal-box">

<h2>Select Player</h2>

<div id="statPlayers"></div>

<br>

<button onclick="closeStat()">Cancel</button>

</div>
</div>


<script>

let avisponesScore=0;
let opponentScore=0;

function updateScore(team,val){

if(team==="avispones"){
avisponesScore=Math.max(0,avisponesScore+val);
document.getElementById("avisponesScore").innerText=avisponesScore;
}else{
opponentScore=Math.max(0,opponentScore+val);
document.getElementById("opponentScore").innerText=opponentScore;
}

}

function resetGame(){

if(confirm("Reset game?")){
location.reload();
}

}

/* PLAYER SYSTEM */

let players=JSON.parse(localStorage.getItem("players"))||[];

function savePlayers(){
localStorage.setItem("players",JSON.stringify(players));
}

function openPlayerManager(){

renderPlayerManager();
document.getElementById("playerManager").style.display="flex";

}

function closePlayerManager(){
document.getElementById("playerManager").style.display="none";
}

function addPlayer(){

let name=document.getElementById("newPlayerName").value;
let unit=document.getElementById("newPlayerUnit").value;

if(!name)return;

players.push({
id:Date.now(),
name,
unit,
td:0,
catch:0,
xp:0,
int:0,
flag:0,
sack:0
});

document.getElementById("newPlayerName").value="";

savePlayers();
renderAll();

}

function deletePlayer(id){

players=players.filter(p=>p.id!==id);

savePlayers();
renderAll();

}

function renderPlayerManager(){

let html="";

players.forEach(p=>{
html+=`<div>${p.name} (${p.unit})
<button onclick="deletePlayer(${p.id})">Delete</button>
</div>`;
});

document.getElementById("playerList").innerHTML=html;

}

/* STAT SYSTEM */

let currentStat="";
let currentUnit="";

function openStat(stat,unit){

currentStat=stat;
currentUnit=unit;

let list="";

players.filter(p=>p.unit===unit).forEach(p=>{
list+=`<button onclick="addStat(${p.id})">${p.name}</button><br>`;
});

document.getElementById("statPlayers").innerHTML=list;

document.getElementById("statModal").style.display="flex";

}

function closeStat(){
document.getElementById("statModal").style.display="none";
}

function addStat(id){

let p=players.find(x=>x.id===id);

p[currentStat]++;

savePlayers();
renderAll();

closeStat();

}

/* LONG PRESS REMOVE */

let pressTimer;

function startPress(id,stat){

pressTimer=setTimeout(()=>{

let p=players.find(x=>x.id===id);

if(p[stat]>0)p[stat]--;

savePlayers();
renderAll();

},700);

}

function cancelPress(){
clearTimeout(pressTimer);
}

/* RENDER TABLES */

function renderAll(){

let offense="";
let defense="";

players.forEach(p=>{

let stats=`TD:${p.td}`;

if(p.unit==="offense"){

stats+=` C:${p.catch} XP:${p.xp}`;

offense+=`<div class="player"
onmousedown="startPress(${p.id},'td')"
onmouseup="cancelPress()"
ontouchstart="startPress(${p.id},'td')"
ontouchend="cancelPress()"
>
${p.name} — ${stats}
</div>`;

}

if(p.unit==="defense"){

stats+=` INT:${p.int} FLAG:${p.flag} SACK:${p.sack}`;

defense+=`<div class="player">
${p.name} — ${stats}
</div>`;

}

});

document.getElementById("offensePlayers").innerHTML=offense;
document.getElementById("defensePlayers").innerHTML=defense;

renderPlayerManager();

}

renderAll();

</script>

</body>
</html>
