<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0b6b3a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h2{margin-top:30px;}

button{
padding:12px 18px;
margin:5px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.statButtons button{
background:#ffcc00;
color:black;
font-weight:bold;
}

.addBtn{background:#007bff;color:white;}
.delBtn{background:#dc3545;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid white;
padding:10px;
}

th{
background:#004d2b;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.popupContent{
background:#222;
padding:20px;
margin:100px auto;
width:300px;
border-radius:10px;
}

.popup button{
width:100%;
margin:8px 0;
font-size:18px;
}

</style>
</head>

<body>

<h1>Avispones Scoreboard</h1>

<button class="addBtn" onclick="addPlayer()">Add Player</button>
<button class="delBtn" onclick="deletePlayer()">Delete Player</button>

<h2>Offense</h2>

<div class="statButtons">
<button onclick="openPopup('TD','offense')">+ TD</button>
<button onclick="openPopup('CATCH','offense')">+ CATCH</button>
<button onclick="openPopup('XP','offense')">+ XP</button>
</div>

<table id="offenseTable">
<tr>
<th>Player</th>
<th>TD</th>
<th>CATCH</th>
<th>XP</th>
</tr>
</table>

<h2>Defense</h2>

<div class="statButtons">
<button onclick="openPopup('INT','defense')">+ INT</button>
<button onclick="openPopup('FLAG','defense')">+ FLAG</button>
<button onclick="openPopup('SACK','defense')">+ SACK</button>
<button onclick="openPopup('TD','defense')">+ TD</button>
</div>

<table id="defenseTable">
<tr>
<th>Player</th>
<th>INT</th>
<th>FLAG</th>
<th>SACK</th>
<th>TD</th>
</tr>
</table>

<div class="popup" id="playerPopup">
<div class="popupContent">
<h3>Select Player</h3>
<div id="playerButtons"></div>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

let players = []
let selectedStat = ""
let selectedSide = ""

function addPlayer(){

let name = prompt("Player name")

if(!name) return

let side = prompt("Type offense or defense")

side = side.toLowerCase()

let player = {name:name,side:side,TD:0,CATCH:0,XP:0,INT:0,FLAG:0,SACK:0}

players.push(player)

renderTables()

}

function deletePlayer(){

let name = prompt("Player name to delete")

players = players.filter(p=>p.name!==name)

renderTables()

}

function renderTables(){

let offenseTable = document.getElementById("offenseTable")
let defenseTable = document.getElementById("defenseTable")

offenseTable.innerHTML =
"<tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>"

defenseTable.innerHTML =
"<tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>"

players.forEach((p,i)=>{

if(p.side==="offense"){

let row = offenseTable.insertRow()

row.insertCell(0).innerText = p.name

row.insertCell(1).innerText = p.TD
row.insertCell(2).innerText = p.CATCH
row.insertCell(3).innerText = p.XP

addLongPress(row, p)

}

if(p.side==="defense"){

let row = defenseTable.insertRow()

row.insertCell(0).innerText = p.name

row.insertCell(1).innerText = p.INT
row.insertCell(2).innerText = p.FLAG
row.insertCell(3).innerText = p.SACK
row.insertCell(4).innerText = p.TD

addLongPress(row, p)

}

})

}

function openPopup(stat,side){

selectedStat = stat
selectedSide = side

let container = document.getElementById("playerButtons")
container.innerHTML = ""

players.forEach((p,i)=>{

if(p.side===side){

let btn = document.createElement("button")
btn.innerText = p.name

btn.onclick = function(){
players[i][stat]++
renderTables()
closePopup()
}

container.appendChild(btn)

}

})

document.getElementById("playerPopup").style.display="block"

}

function closePopup(){
document.getElementById("playerPopup").style.display="none"
}

function addLongPress(row, player){

let cells = row.querySelectorAll("td")

cells.forEach((cell,index)=>{

if(index===0) return

let timer

cell.addEventListener("touchstart",function(){

timer = setTimeout(()=>{

let stat = row.parentElement.rows[0].cells[index].innerText

if(player[stat] > 0){

player[stat]--
renderTables()

}

},600)

})

cell.addEventListener("touchend",function(){
clearTimeout(timer)
})

})

}

</script>

</body>
</html>
