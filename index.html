<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#0b6b3a;
color:white;
margin:0;
padding:20px;
}

h1{margin-bottom:10px;}

input,select{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
text-align:center;
margin:5px;
}

.score-container{
display:flex;
justify-content:space-around;
margin:30px 0;
flex-wrap:wrap;
}

.team{
background:white;
color:#0b6b3a;
padding:20px;
border-radius:15px;
width:300px;
margin:10px;
}

.score{
font-size:70px;
margin:20px 0;
}

button{
padding:14px 20px;
font-size:18px;
margin:6px;
border-radius:10px;
border:none;
cursor:pointer;
}

.add1{background:#28a745;color:white;}
.add6{background:#14532d;color:white;}
.sub{background:#dc3545;color:white;}

.export-btn{background:#ffc107;color:black;margin-top:20px;}
.reset-btn{background:black;color:white;margin-top:10px;}

.stat-btn{
background:#ffd000;
color:black;
font-weight:bold;
font-size:22px;
padding:16px 22px;
margin:8px;
}

table{
width:100%;
max-width:600px;
margin:auto;
border-collapse:collapse;
background:white;
color:black;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#eee;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:white;
color:black;
padding:30px;
border-radius:14px;
}

</style>
</head>

<body>

<div id="scoreExportArea">

<h1>Avispones Scoreboard</h1>

<input id="categoryName" placeholder="Category">

<br>

<select id="jornadaSelect" onchange="handleJornadaChange()">
<option value="">Select Match</option>
<option>Jornada 1</option>
<option>Jornada 2</option>
<option>Jornada 3</option>
<option>Jornada 4</option>
<option>Jornada 5</option>
<option>Quarterfinal</option>
<option>Semifinal</option>
<option>Final</option>
<option value="custom">Custom...</option>
</select>

<input id="customJornada" placeholder="Custom match" style="display:none;">

<div class="score-container">

<div class="team">
<h2>Avispones</h2>

<div class="score" id="avisponesScore">0</div>

<button class="add1" onclick="updateScore('avispones',1)">+1</button>
<button class="add6" onclick="updateScore('avispones',6)">+6</button>
<button class="sub" onclick="updateScore('avispones',-1)">-1</button>

</div>

<div class="team">

<input id="opponentName" placeholder="Opponent Name">

<div class="score" id="opponentScore">0</div>

<button class="add1" onclick="updateScore('opponent',1)">+1</button>
<button class="add6" onclick="updateScore('opponent',6)">+6</button>
<button class="sub" onclick="updateScore('opponent',-1)">-1</button>

</div>

</div>

</div>

<button class="export-btn" onclick="exportScore()">Export Score Image</button>
<br>
<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<hr style="margin:40px 0">

<div id="statsExportArea">

<h2>Avispones Player Stats</h2>

<button onclick="openPlayerManager()">Manage Players</button>

<h3>Offense</h3>

<div>
<button class="stat-btn" onclick="openStat('td','offense')">TD</button>
<button class="stat-btn" onclick="openStat('catch','offense')">CATCH</button>
<button class="stat-btn" onclick="openStat('xp','offense')">XP</button>
</div>

<table id="offenseTable">
<tr>
<th>Player</th>
<th>TD</th>
<th>CATCH</th>
<th>XP</th>
</tr>
</table>

<h3>Defense</h3>

<div>
<button class="stat-btn" onclick="openStat('int','defense')">INT</button>
<button class="stat-btn" onclick="openStat('flag','defense')">FLAG</button>
<button class="stat-btn" onclick="openStat('sack','defense')">SACK</button>
<button class="stat-btn" onclick="openStat('td','defense')">TD</button>
</div>

<table id="defenseTable">
<tr>
<th>Player</th>
<th>INT</th>
<th>FLAG</th>
<th>SACK</th>
<th>TD</th>
</tr>
</table>

</div>

<button class="export-btn" onclick="exportStats()">Export Stats Image</button>

<script>

let avisponesScore=0
let opponentScore=0

function updateScore(team,val){
if(team==="avispones"){
avisponesScore=Math.max(0,avisponesScore+val)
document.getElementById("avisponesScore").innerText=avisponesScore
}else{
opponentScore=Math.max(0,opponentScore+val)
document.getElementById("opponentScore").innerText=opponentScore
}
}

function resetGame(){
if(confirm("Reset game?")){
location.reload()
}
}

function handleJornadaChange(){
const select=document.getElementById("jornadaSelect")
const custom=document.getElementById("customJornada")

if(select.value==="custom"){
custom.style.display="inline-block"
}else{
custom.style.display="none"
}
}

let players=JSON.parse(localStorage.getItem("players"))||[]

function savePlayers(){
localStorage.setItem("players",JSON.stringify(players))
}

function addPlayer(){
let name=document.getElementById("newPlayerName").value
let unit=document.getElementById("newPlayerUnit").value
if(!name)return

players.push({
id:Date.now(),
name,
unit,
td:0,
catch:0,
xp:0,
int:0,
flag:0,
sack:0
})

document.getElementById("newPlayerName").value=""
savePlayers()
renderAll()
}

let currentStat=""
let currentUnit=""

function openStat(stat,unit){
currentStat=stat
currentUnit=unit

let list=""

players.filter(p=>p.unit===unit).forEach(p=>{
list+=`<button onclick="addStat(${p.id})">${p.name}</button><br>`
})

document.getElementById("statPlayers").innerHTML=list
document.getElementById("statModal").style.display="flex"
}

function addStat(id){
let p=players.find(x=>x.id===id)
p[currentStat]++
savePlayers()
renderAll()
}

function renderAll(){

let offenseRows=""
let defenseRows=""

players.forEach(p=>{

if(p.unit==="offense"){
offenseRows+=`
<tr>
<td>${p.name}</td>
<td>${p.td}</td>
<td>${p.catch}</td>
<td>${p.xp}</td>
</tr>`
}

if(p.unit==="defense"){
defenseRows+=`
<tr>
<td>${p.name}</td>
<td>${p.int}</td>
<td>${p.flag}</td>
<td>${p.sack}</td>
<td>${p.td}</td>
</tr>`
}

})

document.getElementById("offenseTable").innerHTML=
`<tr><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>`+offenseRows

document.getElementById("defenseTable").innerHTML=
`<tr><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>TD</th></tr>`+defenseRows
}

renderAll()

function exportScore(){
html2canvas(document.querySelector("#scoreExportArea")).then(canvas=>{
let link=document.createElement("a")
link.download="avispones_score.png"
link.href=canvas.toDataURL()
link.click()
})
}

function exportStats(){
html2canvas(document.querySelector("#statsExportArea")).then(canvas=>{
let link=document.createElement("a")
link.download="avispones_stats.png"
link.href=canvas.toDataURL()
link.click()
})
}

</script>

</body>
</html>
