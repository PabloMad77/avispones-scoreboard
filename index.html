<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- PWA / Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avispones">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07472a">

<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PabloMad77/avispones-scoreboard/main/logo.PNG">
<link rel="icon" href="https://raw.githubusercontent.com/PabloMad77/avispones-scoreboard/main/logo.PNG">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green: #0b6b3a;
  --green-dark: #07472a;
  --green-light: #14a05a;
  --gold: #ffd000;
  --red: #dc3545;
  --white: #ffffff;
}

* { box-sizing: border-box; }

body {
  font-family: 'Roboto', sans-serif;
  text-align: center;
  background: linear-gradient(160deg, #07472a 0%, #0b6b3a 60%, #0d7d45 100%);
  color: white;
  margin: 0;
  padding: 20px;
  padding-top: max(20px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  min-height: 100vh;
}

h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
  color: var(--gold);
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

h2 { font-family: 'Oswald', sans-serif; letter-spacing: 1px; }

input, select {
  padding: 10px 14px;
  font-size: 15px;
  border-radius: 8px;
  border: 2px solid transparent;
  text-align: center;
  margin: 5px;
  background: rgba(255,255,255,0.15);
  color: white;
  outline: none;
  transition: border 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.6); }
input:focus { border-color: var(--gold); }
select { background: rgba(255,255,255,0.15); color: white; }
select option { background: #0b6b3a; color: white; }

.score-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 24px 0;
  flex-wrap: wrap;
}

.team {
  background: white;
  color: var(--green-dark);
  padding: 24px 20px;
  border-radius: 18px;
  width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.team::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: var(--gold);
}
.team h2 { margin: 0 0 4px; font-size: 1.3rem; }
.team input {
  background: #f0f7f0;
  color: var(--green-dark);
  border: 2px solid #c8e6c9;
  width: 100%;
  margin: 0 0 8px;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 1.1rem;
}
.team input::placeholder { color: #aaa; }
.team input:focus { border-color: var(--green); }

.score {
  font-family: 'Oswald', sans-serif;
  font-size: 80px;
  font-weight: 700;
  line-height: 1;
  margin: 12px 0;
  color: var(--green-dark);
  transition: transform 0.15s;
}
.score.bump { transform: scale(1.18); }

.score-buttons { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }

button {
  padding: 11px 16px;
  font-size: 16px;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin: 4px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
button:active { transform: scale(0.95); opacity: 0.85; }

.add1 { background: #28a745; color: white; }
.add6 { background: #14532d; color: white; }
.sub  { background: var(--red); color: white; }

.game-controls { margin: 10px 0; }
.export-btn { background: var(--gold); color: black; font-weight: 700; margin: 6px; }
.reset-btn  { background: #1a1a1a; color: white; margin: 6px; }

/* Auto-save indicator */
#saveIndicator {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
  min-height: 20px;
  transition: opacity 0.4s;
  letter-spacing: 0.3px;
}
#saveIndicator.saved { color: #6effa0; }

hr { border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 40px 0; }

.stat-btn {
  background: var(--gold);
  color: black;
  font-weight: 700;
  font-size: 18px;
  padding: 13px 18px;
  margin: 6px;
  border-radius: 10px;
}

table {
  width: 100%;
  max-width: 600px;
  margin: 10px auto;
  border-collapse: collapse;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
th, td { padding: 8px 6px; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
th:first-child, td:first-child { padding-left: 10px; }
th:nth-child(2), td:nth-child(2) { text-align: left; padding-left: 8px; }
th { background: var(--green-dark); color: white; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f5fdf7; }

.jersey-badge {
  display: inline-block;
  background: var(--green-dark);
  color: var(--gold);
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 12px;
  padding: 1px 7px;
  border-radius: 20px;
  margin-right: 6px;
  vertical-align: middle;
}

/* MODALS */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 16px;
}
.modal.open { display: flex; }

.modal-box {
  background: white;
  color: black;
  padding: 28px;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  position: relative;
}
.modal-box h3 {
  font-family: 'Oswald', sans-serif;
  margin-top: 0;
  color: var(--green-dark);
  font-size: 1.4rem;
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: #eee;
  border: none;
  border-radius: 50%;
  width: 30px; height: 30px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.modal-close:hover { background: #ddd; }

.player-btn-grid { display: flex; flex-direction: column; gap: 4px; justify-content: center; margin-top: 8px; width: 100%; }
.player-btn-grid button { margin: 0; font-size: 15px; padding: 10px 16px; }

.player-list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px;
  border-bottom: 1px solid #eee;
}
.player-list-item span { font-weight: 500; }
.player-list-item .jersey-num {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 13px;
  background: var(--green-dark);
  color: var(--gold);
  padding: 2px 8px;
  border-radius: 20px;
  margin-right: 8px;
  min-width: 36px;
  text-align: center;
  display: inline-block;
}
.remove-btn { background: #fee2e2; color: #dc2626; font-size: 13px; padding: 4px 10px; border-radius: 6px; }

.modal-box input, .modal-box select {
  background: #f5f5f5;
  color: #111;
  border: 2px solid #e0e0e0;
  margin: 4px;
}
.modal-box input:focus { border-color: var(--green); }

.add-player-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
.add-player-row input { flex: 1; min-width: 100px; }
.add-player-row .jersey-input { max-width: 80px; flex: 0 0 80px; }

.subtitle { opacity: 0.7; font-size: 14px; margin: 0 0 16px; }

.stat-jersey {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 13px;
  background: #07472a;
  color: #ffd000;
  padding: 2px 8px;
  border-radius: 20px;
  margin-right: 8px;
  min-width: 36px;
  text-align: center;
  display: inline-block;
}
</style>
</head>

<body>

<div id="scoreExportArea">

  <h1>Avispones</h1>

  <div>
    <input id="categoryName" placeholder="Category / League" oninput="saveGameState()">
  </div>

  <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:6px;">
    <select id="jornadaSelect" onchange="handleJornadaChange()">
      <option value="">Select Match</option>
      <option>Jornada 1</option>
      <option>Jornada 2</option>
      <option>Jornada 3</option>
      <option>Jornada 4</option>
      <option>Jornada 5</option>
      <option>Quarterfinal</option>
      <option>Semifinal</option>
      <option>Final</option>
      <option value="custom">Custom...</option>
    </select>
    <input id="customJornada" placeholder="Custom match name" style="display:none; max-width:180px;" oninput="saveGameState()">
  </div>

  <div class="score-container">

    <div class="team">
      <h2>Avispones</h2>
      <div class="score" id="avisponesScore">0</div>
      <div class="score-buttons">
        <button class="add1" onclick="updateScore('avispones',1)">+1</button>
        <button class="add6" onclick="updateScore('avispones',6)">+6</button>
        <button class="sub"  onclick="updateScore('avispones',-1)">-1</button>
      </div>
    </div>

    <div class="team">
      <input id="opponentName" placeholder="Opponent Name" oninput="saveGameState()">
      <div class="score" id="opponentScore">0</div>
      <div class="score-buttons">
        <button class="add1" onclick="updateScore('opponent',1)">+1</button>
        <button class="add6" onclick="updateScore('opponent',6)">+6</button>
        <button class="sub"  onclick="updateScore('opponent',-1)">-1</button>
      </div>
    </div>

  </div>

  <div id="saveIndicator"></div>

</div>

<div class="game-controls">
  <button class="export-btn" onclick="exportScore()">Export Score Image</button>
  <button class="reset-btn" onclick="resetGame()">Reset Game</button>
</div>

<hr>

<div id="statsExportArea">

  <h2>Player Stats</h2>

  <button onclick="openPlayerManager()" style="background:#e8f5e9; color:#14532d; font-weight:600; margin-bottom:16px;">
    Manage Players
  </button>

  <div style="position:relative; margin: 32px 0 16px;">
    <h3 style="font-family:'Oswald',sans-serif; font-size:2rem; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--gold); margin:0; text-shadow:0 0 20px rgba(255,208,0,0.4);">
      — &nbsp; OFFENSE &nbsp; —
    </h3>
  </div>
  <div>
    <button class="stat-btn" onclick="openStat('td','offense')">TD</button>
    <button class="stat-btn" onclick="openStat('catch','offense')">CATCH</button>
    <button class="stat-btn" onclick="openStat('xp','offense')">XP</button>
  </div>
  <table id="offenseTable">
    <tr><th>#</th><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>
  </table>

  <div style="position:relative; margin: 40px 0 16px;">
    <h3 style="font-family:'Oswald',sans-serif; font-size:2rem; font-weight:700; letter-spacing:6px; text-transform:uppercase; color:var(--gold); margin:0; text-shadow:0 0 20px rgba(255,208,0,0.4);">
      — &nbsp; DEFENSE &nbsp; —
    </h3>
  </div>
  <div>
    <button class="stat-btn" onclick="openStat('int','defense')">INT</button>
    <button class="stat-btn" onclick="openStat('flag','defense')">FLAG</button>
    <button class="stat-btn" onclick="openStat('sack','defense')">SACK</button>
    <button class="stat-btn" onclick="openStat('safety','defense')">SAFETY</button>
    <button class="stat-btn" onclick="openStat('defTd','defense')">TD</button>
  </div>
  <table id="defenseTable">
    <tr><th>#</th><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>SFT</th><th>TD</th></tr>
  </table>

</div>

<div style="margin-top:16px;">
  <button class="export-btn" onclick="exportStats()">Export Stats Image</button>
  <button class="reset-btn" onclick="resetStats()">Reset Stats</button>
</div>


<!-- IMAGE PREVIEW MODAL -->
<div class="modal" id="previewModal">
  <div class="modal-box" style="max-width:500px; text-align:center;">
    <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
    <h3 style="margin-bottom:6px;">Preview</h3>
    <p class="subtitle" style="margin-bottom:14px;">Long-press the image to save, or use the buttons below</p>
    <img id="previewImg" style="width:100%; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:block; margin-bottom:16px;">
    <button id="previewActionBtn" style="background:#07472a; color:white; width:100%; padding:14px; font-size:17px;">
      Save / Share
    </button>
    <p id="shareHint" style="font-size:12px; color:#999; margin-top:10px; display:none;"></p>
  </div>
</div>

<!-- STAT MODAL -->
<div class="modal" id="statModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('statModal')">✕</button>
    <h3 id="statModalTitle">Select Player</h3>
    <p class="subtitle">Tap + to add or − to remove</p>
    <div class="player-btn-grid" id="statPlayers"></div>
  </div>
</div>

<!-- PLAYER MANAGER MODAL -->
<div class="modal" id="playerModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('playerModal')">✕</button>
    <h3>Manage Players</h3>
    <div id="playerList" style="margin-bottom:16px; text-align:left;"></div>
    <div style="background:#f5f5f5; border-radius:10px; padding:16px;">
      <strong style="display:block; margin-bottom:8px; color:#333;">Add New Player</strong>
      <div style="display:flex; gap:4px; font-size:11px; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; padding:0 2px;">
        <span style="flex:0 0 76px; text-align:center;">Jersey #</span>
        <span style="flex:2; padding-left:4px;">Name</span>
      </div>
      <div class="add-player-row">
        <input id="newPlayerJersey" class="jersey-input" placeholder="e.g. 7" type="text" inputmode="numeric" maxlength="2">
        <input id="newPlayerName" placeholder="e.g. Juan García" style="flex:2;">
      </div>
      <input type="hidden" id="newPlayerUnit" value="offense">
      <div style="display:flex; gap:8px; margin-top:10px;">
        <button id="unitOffenseBtn" onclick="setUnit('offense')" type="button"
          style="flex:1; padding:10px; border-radius:8px; border:2px solid #07472a; background:#07472a; color:#ffd000; font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; cursor:pointer;">
          OFFENSE
        </button>
        <button id="unitDefenseBtn" onclick="setUnit('defense')" type="button"
          style="flex:1; padding:10px; border-radius:8px; border:2px solid #ddd; background:white; color:#555; font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; cursor:pointer;">
          DEFENSE
        </button>
      </div>
      <button onclick="addPlayer()" style="background:var(--green); color:white; margin-top:10px; width:100%; padding:12px;">
        Add Player
      </button>
    </div>
  </div>
</div>


<script>

// ─── Auto-save: Game State ────────────────────────────────────────────────────

let avisponesScore = 0;
let opponentScore  = 0;

function saveGameState() {
  const state = {
    avisponesScore,
    opponentScore,
    opponentName:  document.getElementById('opponentName').value,
    categoryName:  document.getElementById('categoryName').value,
    jornada:       document.getElementById('jornadaSelect').value,
    customJornada: document.getElementById('customJornada').value,
  };
  localStorage.setItem('gameState', JSON.stringify(state));
  flashSaved();
}

function loadGameState() {
  try {
    const raw = localStorage.getItem('gameState');
    if (!raw) return;
    const s = JSON.parse(raw);

    avisponesScore = s.avisponesScore || 0;
    opponentScore  = s.opponentScore  || 0;

    document.getElementById('avisponesScore').innerText = avisponesScore;
    document.getElementById('opponentScore').innerText  = opponentScore;

    if (s.opponentName)  document.getElementById('opponentName').value  = s.opponentName;
    if (s.categoryName)  document.getElementById('categoryName').value  = s.categoryName;
    if (s.jornada) {
      document.getElementById('jornadaSelect').value = s.jornada;
      if (s.jornada === 'custom') {
        document.getElementById('customJornada').style.display = 'inline-block';
        document.getElementById('customJornada').value = s.customJornada || '';
      }
    }
  } catch(e) {}
}

let saveTimer = null;
function flashSaved() {
  const el = document.getElementById('saveIndicator');
  el.textContent = '✓ Guardado automáticamente';
  el.classList.add('saved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    el.textContent = '';
    el.classList.remove('saved');
  }, 2000);
}

// ─── Score ────────────────────────────────────────────────────────────────────

function updateScore(team, val) {
  if (team === 'avispones') {
    avisponesScore = Math.max(0, avisponesScore + val);
    document.getElementById('avisponesScore').innerText = avisponesScore;
  } else {
    opponentScore = Math.max(0, opponentScore + val);
    document.getElementById('opponentScore').innerText = opponentScore;
  }
  const key = team === 'avispones' ? 'avisponesScore' : 'opponentScore';
  const el = document.getElementById(key);
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
  saveGameState();
}

function resetGame() {
  if (!confirm('Reset game? Scores and match info will be cleared.')) return;
  avisponesScore = 0;
  opponentScore  = 0;
  document.getElementById('avisponesScore').innerText = 0;
  document.getElementById('opponentScore').innerText  = 0;
  document.getElementById('opponentName').value  = '';
  document.getElementById('categoryName').value  = '';
  document.getElementById('jornadaSelect').value = '';
  document.getElementById('customJornada').value = '';
  document.getElementById('customJornada').style.display = 'none';
  localStorage.removeItem('gameState');
  flashSaved();
}

function handleJornadaChange() {
  const select = document.getElementById('jornadaSelect');
  const custom = document.getElementById('customJornada');
  custom.style.display = select.value === 'custom' ? 'inline-block' : 'none';
  saveGameState();
}

// ─── Players ──────────────────────────────────────────────────────────────────

let players = JSON.parse(localStorage.getItem('players') || '[]');
players = players.map(p => ({ jersey: '', ...p }));

function setUnit(unit) {
  document.getElementById('newPlayerUnit').value = unit;
  const offBtn = document.getElementById('unitOffenseBtn');
  const defBtn = document.getElementById('unitDefenseBtn');
  if (unit === 'offense') {
    offBtn.style.background = '#07472a'; offBtn.style.color = '#ffd000'; offBtn.style.borderColor = '#07472a';
    defBtn.style.background = 'white';   defBtn.style.color = '#555';    defBtn.style.borderColor = '#ddd';
  } else {
    defBtn.style.background = '#07472a'; defBtn.style.color = '#ffd000'; defBtn.style.borderColor = '#07472a';
    offBtn.style.background = 'white';   offBtn.style.color = '#555';    offBtn.style.borderColor = '#ddd';
  }
}

function savePlayers() { localStorage.setItem('players', JSON.stringify(players)); }

function sortedByJersey(arr) {
  return [...arr].sort((a, b) => {
    const na = a.jersey !== '' && a.jersey != null ? Number(a.jersey) : Infinity;
    const nb = b.jersey !== '' && b.jersey != null ? Number(b.jersey) : Infinity;
    return na - nb;
  });
}

function openPlayerManager() { renderPlayerList(); openModal('playerModal'); }

function renderPlayerList() {
  const container = document.getElementById('playerList');
  if (!players.length) { container.innerHTML = '<p style="color:#999; text-align:center;">No players yet.</p>'; return; }

  const sorted = sortedByJersey(players);

  // Group by unit with section headers
  const offPlayers = sorted.filter(p => p.unit === 'offense');
  const defPlayers = sorted.filter(p => p.unit === 'defense');

  function playerRow(p) {
    const isOff = p.unit === 'offense';
    const bgColor    = isOff ? '#fffbe6' : '#e8f5e9';
    const badgeBg    = isOff ? '#b8860b' : '#07472a';
    const badgeColor = isOff ? '#fff8dc' : '#ffd000';
    const nameColor  = isOff ? '#7a5c00' : '#14532d';
    return `
      <div class="player-list-item" style="background:${bgColor}; border-radius:8px; margin-bottom:4px; padding:8px 10px;">
        <span style="display:flex; align-items:center; gap:0;">
          <span style="
            font-family:'Oswald',sans-serif; font-weight:700; font-size:13px;
            background:${badgeBg}; color:${badgeColor};
            padding:2px 8px; border-radius:20px; margin-right:8px;
            min-width:36px; text-align:center; display:inline-block;">
            ${p.jersey !== '' && p.jersey !== undefined ? '#' + p.jersey : '—'}
          </span>
          <span style="font-weight:600; color:${nameColor};">${p.name}</span>
        </span>
        <button class="remove-btn" onclick="removePlayer(${p.id})">Remove</button>
      </div>`;
  }

  let html = '';
  if (offPlayers.length) {
    html += `<div style="font-family:'Oswald',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; color:#b8860b; text-transform:uppercase; margin:8px 2px 4px;">Offense</div>`;
    html += offPlayers.map(playerRow).join('');
  }
  if (defPlayers.length) {
    html += `<div style="font-family:'Oswald',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; color:#14532d; text-transform:uppercase; margin:${offPlayers.length ? '14px' : '8px'} 2px 4px;">Defense</div>`;
    html += defPlayers.map(playerRow).join('');
  }

  container.innerHTML = html;
}

function addPlayer() {
  const name   = document.getElementById('newPlayerName').value.trim();
  const unit   = document.getElementById('newPlayerUnit').value;
  const jersey = document.getElementById('newPlayerJersey').value.trim();
  if (!name) return;
  players.push({ id: Date.now(), name, unit, jersey,
    td:0, catch:0, xp:0, int:0, flag:0, sack:0, safety:0, defTd:0 });
  document.getElementById('newPlayerName').value   = '';
  document.getElementById('newPlayerJersey').value = '';
  setUnit('offense');
  savePlayers(); renderPlayerList(); renderAll();
}

function removePlayer(id) {
  if (!confirm('Remove this player?')) return;
  players = players.filter(p => p.id !== id);
  savePlayers(); renderPlayerList(); renderAll();
}

// ─── Stats ────────────────────────────────────────────────────────────────────

let currentStat = '', currentUnit = '';
const statLabels = { td:'TD', catch:'CATCH', xp:'XP', int:'INT', flag:'FLAG', sack:'SACK', safety:'SAFETY', defTd:'TD (DEF)' };

function openStat(stat, unit) {
  currentStat = stat; currentUnit = unit;
  document.getElementById('statModalTitle').textContent =
    `${statLabels[stat] || stat} — ${unit.charAt(0).toUpperCase() + unit.slice(1)}`;
  const pool = sortedByJersey(players.filter(p => p.unit === unit));
  document.getElementById('statPlayers').innerHTML = !pool.length
    ? '<p style="color:#999;">No players in this unit. Add some first.</p>'
    : pool.map(p => `
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;background:#f5fdf7;border-radius:10px;padding:10px 14px;margin-bottom:8px;">
        <span style="font-weight:600;font-size:16px;color:#14532d;flex:1;text-align:left;display:flex;align-items:center;gap:6px;">
          ${p.jersey !== '' && p.jersey !== undefined ? `<span class="stat-jersey">#${p.jersey}</span>` : ''}
          ${p.name}
        </span>
        <span id="statVal-${p.id}" style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#07472a;min-width:32px;text-align:center;">${p[stat] || 0}</span>
        <div style="display:flex;gap:6px;margin-left:12px;">
          <button onclick="removeStat(${p.id})" style="background:#fee2e2;color:#dc2626;font-size:20px;font-weight:700;padding:6px 14px;border-radius:8px;margin:0;">−</button>
          <button onclick="addStat(${p.id})" style="background:#14532d;color:white;font-size:20px;font-weight:700;padding:6px 14px;border-radius:8px;margin:0;">+</button>
        </div>
      </div>`).join('');
  openModal('statModal');
}

function addStat(id) {
  const p = players.find(x => x.id === id); if (!p) return;
  p[currentStat] = (p[currentStat] || 0) + 1;
  savePlayers(); renderAll();
  const el = document.getElementById(`statVal-${id}`); if (el) el.textContent = p[currentStat];
}

function removeStat(id) {
  const p = players.find(x => x.id === id); if (!p) return;
  p[currentStat] = Math.max(0, (p[currentStat] || 0) - 1);
  savePlayers(); renderAll();
  const el = document.getElementById(`statVal-${id}`); if (el) el.textContent = p[currentStat];
}

function renderAll() {
  let off = '', def = '';
  sortedByJersey(players).forEach(p => {
    const jc = p.jersey !== '' && p.jersey !== undefined
      ? `<td style="font-family:'Oswald',sans-serif;font-weight:700;color:var(--green-dark);">#${p.jersey}</td>`
      : `<td style="color:#aaa;">—</td>`;
    if (p.unit === 'offense')
      off += `<tr>${jc}<td>${p.name}</td><td>${p.td}</td><td>${p.catch}</td><td>${p.xp}</td></tr>`;
    if (p.unit === 'defense')
      def += `<tr>${jc}<td>${p.name}</td><td>${p.int}</td><td>${p.flag}</td><td>${p.sack}</td><td>${p.safety||0}</td><td>${p.defTd}</td></tr>`;
  });
  document.getElementById('offenseTable').innerHTML =
    `<tr><th>#</th><th>Player</th><th>TD</th><th>CATCH</th><th>XP</th></tr>` + off;
  document.getElementById('defenseTable').innerHTML =
    `<tr><th>#</th><th>Player</th><th>INT</th><th>FLAG</th><th>SACK</th><th>SFT</th><th>TD</th></tr>` + def;
}

// ─── Modals ───────────────────────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

window.addEventListener('click', e => {
  ['statModal','playerModal','previewModal'].forEach(id => {
    if (e.target === document.getElementById(id)) closeModal(id);
  });
});

// ─── Export ───────────────────────────────────────────────────────────────────

const IG_W = 1080, IG_H = 1350;
const C = { green:'#0b6b3a', greenDark:'#07472a', gold:'#ffd000', white:'#ffffff', offwhite:'#f0f0f0', black:'#0a0a0a' };

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawScoreCard(logo) {
  // Layout constants
  const logoSize = 280;
  const logoY    = 60;           // top of logo area
  const logoH    = logoSize;     // space reserved for logo/title
  const cardY    = logoY + logoH + 30;
  const cardH    = 420;
  const cardPad  = 60;
  const sepGap   = 54;           // gap between card bottom and separator line
  const FOOTER_H = 170;          // footer text area
  const PADDING  = 40;           // bottom breathing room before footer

  const canvasH  = cardY + cardH + sepGap + FOOTER_H + PADDING;

  const canvas = document.createElement('canvas');
  canvas.width = IG_W; canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  // Background
  const bg = ctx.createLinearGradient(0,0,IG_W,canvasH);
  bg.addColorStop(0,'#04200f'); bg.addColorStop(0.5,C.greenDark); bg.addColorStop(1,'#0d5c30');
  ctx.fillStyle = bg; ctx.fillRect(0,0,IG_W,canvasH);

  // Diagonal accent stripe
  ctx.save(); ctx.globalAlpha=0.06; ctx.fillStyle=C.white;
  ctx.beginPath();
  ctx.moveTo(0,canvasH*0.5); ctx.lineTo(IG_W,canvasH*0.25);
  ctx.lineTo(IG_W,canvasH*0.55); ctx.lineTo(0,canvasH*0.8);
  ctx.closePath(); ctx.fill(); ctx.restore();

  // Gold top bar
  ctx.fillStyle = C.gold; ctx.fillRect(0,0,IG_W,18);

  // Logo / title
  const logoCenterY = logoY + logoH / 2 + 10;
  if (logo) { drawLogo(ctx, logo, IG_W/2, logoCenterY, logoSize); }
  else {
    ctx.fillStyle=C.gold; ctx.font='bold 110px Oswald,Arial';
    ctx.textAlign='center'; ctx.fillText('AVISPONES',IG_W/2, logoY + 120);
  }

  // Score cards
  const halfW=IG_W/2-cardPad, card1X=cardPad, card2X=IG_W/2+20, cardW=halfW-20;

  roundRect(ctx,card1X,cardY,cardW,cardH,28); ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
  roundRect(ctx,card1X,cardY,cardW,cardH,28); ctx.strokeStyle=C.gold; ctx.lineWidth=4; ctx.stroke();

  roundRect(ctx,card2X,cardY,cardW,cardH,28); ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
  roundRect(ctx,card2X,cardY,cardW,cardH,28); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=4; ctx.stroke();

  // Team names
  ctx.fillStyle=C.gold; ctx.font='bold 44px Oswald,Arial'; ctx.textAlign='center';
  ctx.fillText('AVISPONES', card1X+cardW/2, cardY+72);

  const opponent = document.getElementById('opponentName').value.trim() || 'RIVAL';
  ctx.fillStyle=C.offwhite; ctx.fillText(opponent.toUpperCase(), card2X+cardW/2, cardY+72);

  // Scores
  ctx.font='bold 220px Oswald,Arial'; ctx.fillStyle=C.white;
  ctx.fillText(String(avisponesScore), card1X+cardW/2, cardY+320);
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillText(String(opponentScore), card2X+cardW/2, cardY+320);

  // VS pill
  const vsX=IG_W/2, vsY=cardY+cardH/2+10;
  ctx.fillStyle=C.gold; roundRect(ctx,vsX-42,vsY-46,84,70,35); ctx.fill();
  ctx.fillStyle=C.black; ctx.font='bold 42px Oswald,Arial'; ctx.textAlign='center';
  ctx.fillText('VS',vsX,vsY+14);

  // Separator line
  ctx.strokeStyle=C.gold; ctx.lineWidth=3; ctx.globalAlpha=0.4;
  ctx.beginPath(); ctx.moveTo(80,cardY+cardH+sepGap); ctx.lineTo(IG_W-80,cardY+cardH+sepGap); ctx.stroke();
  ctx.globalAlpha=1;

  drawFooter(ctx, canvasH); return canvas;
}

function drawStatsCard(logo) {
  // Pre-calculate row data first so we can size the canvas
  const ROW_H=68, HEAD_H=58;
  const offP=sortedByJersey(players.filter(p=>p.unit==='offense')).filter(p=>p.td>0||p.catch>0||p.xp>0);
  const offRows=offP.length ? offP.map(p=>[p.jersey?`#${p.jersey}`:'—',p.name,p.td,p.catch,p.xp]) : [['—','—','—','—','—']];
  const defP=sortedByJersey(players.filter(p=>p.unit==='defense')).filter(p=>p.int>0||p.flag>0||p.sack>0||p.defTd>0);
  const defRows=defP.length ? defP.map(p=>[p.jersey?`#${p.jersey}`:'—',p.name,p.int,p.flag,p.sack,p.defTd]) : [['—','—','—','—','—','—','—']];

  // Calculate total height needed: header(215) + off table + gap(90) + def table + footer(170) + padding(40)
  function tblH(rows) { return 20 + HEAD_H + rows.length * ROW_H; }
  const FOOTER_H = 170;
  const neededH = 215 + 60 + tblH(offRows) + 90 + 60 + tblH(defRows) + FOOTER_H + 40;
  const canvasH = Math.max(IG_H, neededH);

  const canvas = document.createElement('canvas');
  canvas.width = IG_W; canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  const bg = ctx.createLinearGradient(0,0,IG_W,canvasH);
  bg.addColorStop(0,'#04200f'); bg.addColorStop(1,'#0d5c30');
  ctx.fillStyle=bg; ctx.fillRect(0,0,IG_W,canvasH);
  ctx.fillStyle=C.gold; ctx.fillRect(0,0,IG_W,18);

  const TITLE_Y=140;
  if (logo) {
    const logoSize=90;
    ctx.font='bold 90px Oswald,Arial';
    const titleW=ctx.measureText('GAME STATS').width;
    const groupW=logoSize+20+titleW, groupX=(IG_W-groupW)/2;
    ctx.save(); ctx.shadowColor=C.gold; ctx.shadowBlur=35;
    ctx.drawImage(logo,groupX,TITLE_Y-logoSize+10,logoSize,logoSize);
    ctx.shadowBlur=70; ctx.globalAlpha=0.35;
    ctx.drawImage(logo,groupX,TITLE_Y-logoSize+10,logoSize,logoSize); ctx.restore();
    ctx.drawImage(logo,groupX,TITLE_Y-logoSize+10,logoSize,logoSize);
    ctx.fillStyle=C.gold; ctx.textAlign='left';
    ctx.fillText('GAME STATS',groupX+logoSize+20,TITLE_Y);
  } else {
    ctx.fillStyle=C.gold; ctx.font='bold 90px Oswald,Arial'; ctx.textAlign='center';
    ctx.fillText('GAME STATS',IG_W/2,TITLE_Y);
  }

  function drawTable(title, cols, rows, startY) {
    const PAD=50, tableW=IG_W-PAD*2, colW=tableW/cols.length, ROW_H=68, HEAD_H=58;
    ctx.fillStyle=C.gold; ctx.font='bold 46px Oswald,Arial'; ctx.textAlign='left';
    ctx.fillText(title,PAD,startY-10);
    ctx.fillStyle=C.gold; ctx.fillRect(PAD,startY,80,5);
    const tableY=startY+20;
    roundRect(ctx,PAD,tableY,tableW,HEAD_H,14); ctx.fillStyle=C.greenDark; ctx.fill();
    ctx.fillStyle=C.gold; ctx.font='bold 32px Oswald,Arial'; ctx.textAlign='center';
    cols.forEach((col,i) => ctx.fillText(col.toUpperCase(), PAD+colW*i+colW/2, tableY+38));
    rows.forEach((row,ri) => {
      const ry=tableY+HEAD_H+ri*ROW_H;
      roundRect(ctx,PAD,ry,tableW,ROW_H,0);
      ctx.fillStyle=ri%2===0?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.02)'; ctx.fill();
      row.forEach((cell,ci) => {
        if (ci===0) {
          const px=PAD+colW/2, py=ry+ROW_H*0.65;
          if (cell!=='—') {
            ctx.save();
            roundRect(ctx,px-32,py-26,64,34,17); ctx.fillStyle=C.gold; ctx.fill();
            ctx.fillStyle=C.greenDark; ctx.font='bold 26px Oswald,Arial'; ctx.textAlign='center';
            ctx.fillText(cell,px,py+4); ctx.restore();
          } else {
            ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='400 26px Oswald,Arial';
            ctx.textAlign='center'; ctx.fillText('—',px,py+4);
          }
        } else if (ci===1) {
          ctx.fillStyle=C.white; ctx.font='600 30px Oswald,Arial'; ctx.textAlign='left';
          ctx.fillText(String(cell),PAD+colW+14,ry+ROW_H*0.65);
        } else {
          ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='500 30px Oswald,Arial'; ctx.textAlign='center';
          ctx.fillText(String(cell),PAD+colW*ci+colW/2,ry+ROW_H*0.65);
        }
      });
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(PAD,ry+ROW_H); ctx.lineTo(PAD+tableW,ry+ROW_H); ctx.stroke();
    });
    const totalH=HEAD_H+rows.length*ROW_H;
    roundRect(ctx,PAD,tableY,tableW,totalH,14); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2; ctx.stroke();
    return tableY+totalH;
  }

  let nextY=drawTable('OFFENSE',['#','Player','TD','CATCH','XP'],offRows,215);
  drawTable('DEFENSE',['#','Player','INT','FLAG','SACK','SFT','TD'],defRows,nextY+90);

  drawFooter(ctx, canvasH); return canvas;
}

function showPreview(canvas, filename) {
  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('previewImg').src = dataUrl;
  document.getElementById('shareHint').style.display = 'none';
  document.getElementById('previewActionBtn').onclick = async () => {
    if (navigator.share && navigator.canShare) {
      try {
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], filename, { type:'image/png' });
        if (navigator.canShare({ files:[file] })) { await navigator.share({ files:[file], title:'Avispones' }); return; }
      } catch(e) { if (e.name==='AbortError') return; }
    }
    const a = document.createElement('a'); a.download=filename; a.href=dataUrl; a.click();
  };
  openModal('previewModal');
}

function getMetaInfo() {
  const category   = document.getElementById('categoryName').value.trim();
  const jornadaSel = document.getElementById('jornadaSelect');
  const customJ    = document.getElementById('customJornada').value.trim();
  const jornada    = jornadaSel.value==='custom' ? customJ : jornadaSel.value||'';
  const now        = new Date();
  const timestamp  = now.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
                   + '  •  ' + now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  return { category, jornada, timestamp };
}

function drawFooter(ctx, h) {
  h = h || IG_H;
  const { category, jornada, timestamp } = getMetaInfo();
  ctx.fillStyle=C.gold; ctx.fillRect(0,h-18,IG_W,18);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='500 42px Oswald,Arial'; ctx.textAlign='center';
  ctx.fillText('AVISPONES FLAG FOOTBALL',IG_W/2,h-120);
  const metaLine=[category,jornada].filter(Boolean).join('  ·  ');
  if (metaLine) { ctx.fillStyle=C.gold; ctx.font='bold 46px Oswald,Arial'; ctx.fillText(metaLine.toUpperCase(),IG_W/2,h-70); }
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='400 36px Oswald,Arial'; ctx.fillText(timestamp,IG_W/2,h-28);
}

const LOGO_URL = 'https://raw.githubusercontent.com/PabloMad77/avispones-scoreboard/main/logo.PNG';

function loadLogo() {
  return new Promise(resolve => {
    const img = new Image(); img.crossOrigin='anonymous';
    img.onload=()=>resolve(img); img.onerror=()=>resolve(null); img.src=LOGO_URL;
  });
}

function drawLogo(ctx, img, x, y, size) {
  if (!img) return;
  ctx.save(); ctx.shadowColor=C.gold; ctx.shadowBlur=40;
  ctx.drawImage(img,x-size/2,y-size/2,size,size);
  ctx.shadowBlur=80; ctx.globalAlpha=0.4;
  ctx.drawImage(img,x-size/2,y-size/2,size,size); ctx.restore();
  ctx.drawImage(img,x-size/2,y-size/2,size,size);
}

function resetStats() {
  if (!confirm('Reset all player stats? Players will be kept but all stats cleared.')) return;
  players=players.map(p=>({...p,td:0,catch:0,xp:0,int:0,flag:0,sack:0,safety:0,defTd:0}));
  savePlayers(); renderAll();
}

function exportScore() { loadLogo().then(logo=>showPreview(drawScoreCard(logo),'avispones_score.png')); }
function exportStats()  { loadLogo().then(logo=>showPreview(drawStatsCard(logo),'avispones_stats.png')); }

loadGameState();
renderAll();

</script>
