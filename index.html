<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avispones Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,sans-serif;
text-align:center;
background:#0b6b3a;
color:white;
margin:0;
padding:20px;
}

input,select{
padding:8px;
font-size:16px;
border-radius:8px;
border:none;
margin:5px;
text-align:center;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px;
}

.score-container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin:30px 0;
}

.team{
background:white;
color:#0b6b3a;
padding:20px;
border-radius:15px;
width:260px;
}

.score{
font-size:70px;
margin:20px 0;
}

.add1{background:#28a745;color:white;}
.add6{background:#14532d;color:white;}
.sub{background:#dc3545;color:white;}

.export-btn{
background:#ffc107;
color:black;
}

.reset-btn{
background:black;
color:white;
}

/* TABLE */

table{
margin:auto;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:10px 12px;
border:1px solid #ddd;
}

/* MODAL */

#playerModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
color:black;
padding:30px;
border-radius:12px;
width:320px;
max-height:80vh;
overflow:auto;
}

.playerRow{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.deleteBtn{
background:#dc3545;
color:white;
font-size:12px;
padding:4px 8px;
}

</style>
</head>

<body>

<h1>Avispones Scoreboard</h1>

<input id="categoryName" placeholder="Category" oninput="saveState()">

<br>

<select id="jornadaSelect" onchange="handleJornadaChange()">
<option value="">Select Match</option>
<option>Jornada 1</option>
<option>Jornada 2</option>
<option>Jornada 3</option>
<option>Jornada 4</option>
<option>Jornada 5</option>
<option>Quarterfinal</option>
<option>Semifinal</option>
<option>Final</option>
<option value="custom">Custom...</option>
</select>

<input id="customJornada" placeholder="Custom match" style="display:none" oninput="saveState()">

<div class="score-container">

<div class="team">
<h2>Avispones</h2>

<div id="avisponesScore" class="score">0</div>

<button class="add1" onclick="updateScore('avispones',1)">+1</button>
<button class="add6" onclick="updateScore('avispones',6)">+6</button>
<button class="sub" onclick="updateScore('avispones',-1)">-1</button>

</div>

<div class="team">

<input id="opponentName" placeholder="Opponent" oninput="saveState()">

<div id="opponentScore" class="score">0</div>

<button class="add1" onclick="updateScore('opponent',1)">+1</button>
<button class="add6" onclick="updateScore('opponent',6)">+6</button>
<button class="sub" onclick="updateScore('opponent',-1)">-1</button>

</div>

</div>

<button class="export-btn" onclick="exportScore()">Export Score Image</button>
<br>
<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<hr style="margin:40px 0">

<h2>Avispones Player Stats</h2>

<button onclick="openPlayerModal()">Manage Players</button>

<h3>Offense</h3>

<table>
<thead>
<tr>
<th>Player</th>
<th>TD</th>
<th>Catch</th>
<th>XP</th>
</tr>
</thead>

<tbody id="offenseTable"></tbody>
</table>

<h3 style="margin-top:30px;">Defense</h3>

<table>
<thead>
<tr>
<th>Player</th>
<th>INT</th>
<th>Flag</th>
<th>TD</th>
</tr>
</thead>

<tbody id="defenseTable"></tbody>
</table>

<!-- PLAYER MODAL -->

<div id="playerModal">

<div class="modal-box">

<h3>Add Player</h3>

<input id="playerName" placeholder="Player name">

<br>

<select id="playerUnit">
<option value="offense">Offense</option>
<option value="defense">Defense</option>
</select>

<br>

<button onclick="addPlayer()">Add Player</button>

<hr>

<h3>Current Players</h3>

<div id="playerList"></div>

<br>

<button onclick="closePlayerModal()">Close</button>

</div>

</div>

<script>

/* SCORE SYSTEM */

let avisponesScore=0
let opponentScore=0

function updateScore(team,val){

if(team==="avispones"){
avisponesScore=Math.max(0,avisponesScore+val)
document.getElementById("avisponesScore").textContent=avisponesScore
}else{
opponentScore=Math.max(0,opponentScore+val)
document.getElementById("opponentScore").textContent=opponentScore
}

saveState()

}

/* SAVE GAME */

function saveState(){

const data={
avispones:avisponesScore,
opponent:opponentScore,
opponentName:document.getElementById("opponentName").value,
categoryName:document.getElementById("categoryName").value
}

localStorage.setItem("avisponesGame",JSON.stringify(data))

}

/* RESET */

function resetGame(){

if(confirm("Reset game?")){

localStorage.removeItem("avisponesGame")
localStorage.removeItem("avisponesPlayers")

location.reload()

}

}

/* PLAYER SYSTEM */

let players=JSON.parse(localStorage.getItem("avisponesPlayers"))||[]

function openPlayerModal(){

document.getElementById("playerModal").style.display="flex"

renderPlayerList()

}

function closePlayerModal(){

document.getElementById("playerModal").style.display="none"

}

function addPlayer(){

const name=document.getElementById("playerName").value.trim()
const unit=document.getElementById("playerUnit").value

if(!name)return

players.push({
id:Date.now(),
name:name,
unit:unit,
td:0,
catch:0,
xp:0,
int:0,
flag:0
})

document.getElementById("playerName").value=""

savePlayers()

renderPlayers()

renderPlayerList()

}

function deletePlayer(id){

players=players.filter(p=>p.id!==id)

savePlayers()

renderPlayers()

renderPlayerList()

}

function savePlayers(){

localStorage.setItem("avisponesPlayers",JSON.stringify(players))

}

function renderPlayerList(){

const list=document.getElementById("playerList")

list.innerHTML=""

players.forEach(p=>{

list.innerHTML+=`

<div class="playerRow">

<span>${p.name} (${p.unit})</span>

<button class="deleteBtn" onclick="deletePlayer(${p.id})">Delete</button>

</div>

`

})

}

/* STATS */

function updateStat(id,stat,val){

const player=players.find(p=>p.id===id)

player[stat]=Math.max(0,(player[stat]||0)+val)

savePlayers()

renderPlayers()

}

function renderPlayers(){

const offense=document.getElementById("offenseTable")
const defense=document.getElementById("defenseTable")

offense.innerHTML=""
defense.innerHTML=""

players.forEach(p=>{

if(p.unit==="offense"){

offense.innerHTML+=`

<tr>

<td>${p.name}</td>

<td>
${p.td}
<button onclick="updateStat(${p.id},'td',1)">+</button>
<button onclick="updateStat(${p.id},'td',-1)">-</button>
</td>

<td>
${p.catch}
<button onclick="updateStat(${p.id},'catch',1)">+</button>
<button onclick="updateStat(${p.id},'catch',-1)">-</button>
</td>

<td>
${p.xp}
<button onclick="updateStat(${p.id},'xp',1)">+</button>
<button onclick="updateStat(${p.id},'xp',-1)">-</button>
</td>

</tr>

`

}

if(p.unit==="defense"){

defense.innerHTML+=`

<tr>

<td>${p.name}</td>

<td>
${p.int}
<button onclick="updateStat(${p.id},'int',1)">+</button>
<button onclick="updateStat(${p.id},'int',-1)">-</button>
</td>

<td>
${p.flag}
<button onclick="updateStat(${p.id},'flag',1)">+</button>
<button onclick="updateStat(${p.id},'flag',-1)">-</button>
</td>

<td>
${p.td}
<button onclick="updateStat(${p.id},'td',1)">+</button>
<button onclick="updateStat(${p.id},'td',-1)">-</button>
</td>

</tr>

`

}

})

}

/* EXPORT */

function exportScore(){

const canvas=document.createElement("canvas")
canvas.width=1080
canvas.height=1080

const ctx=canvas.getContext("2d")

ctx.fillStyle="#D4AF37"
ctx.fillRect(0,0,1080,1080)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="bold 80px Arial"
ctx.fillText("AVISPONES "+avisponesScore,540,500)

const opponent=document.getElementById("opponentName").value||"RIVAL"

ctx.fillText(opponent+" "+opponentScore,540,620)

canvas.toBlob(function(blob){

const url=URL.createObjectURL(blob)

const link=document.createElement("a")
link.href=url
link.download="avispones-score.png"
link.click()

})

}

renderPlayers()

</script>

</body>
</html>
